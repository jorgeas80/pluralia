app = "pluralia-api"
primary_region = "cdg"

[build]
  dockerfile = "services/api/Dockerfile"

[deploy]
  release_command = "sh -c 'cd services/api && alembic upgrade head'"

[env]
  PYTHONUNBUFFERED = "1"
  DROP_DB = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
