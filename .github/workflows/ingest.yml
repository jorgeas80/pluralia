name: News Ingest

on:
  schedule:
    - cron: "0 8,18 * * *"  # 2 veces al día: 8h y 18h UTC
  workflow_dispatch: # también ejecutable manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r services/ingest/requirements.txt

      - name: Run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m services.ingest.src.main

      - name: Generate static JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m services.ingest.src.generate_static_data

      - name: Commit and push static data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/web/public/data/news.json services/web/public/data/groups.json
          if git diff --staged --quiet; then
            echo "No changes to static data, skipping commit."
          else
            git commit -m "chore(data): update static JSON cache [skip ci]"
            git push origin main
          fi
